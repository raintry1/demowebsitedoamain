<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse · client content hub</title>
  <!-- Font Awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: #f1f5f9;
      display: flex;
      justify-content: center;
      padding: 2rem 1.2rem;
    }

    .app {
      max-width: 1440px;
      width: 100%;
      background: #ffffff;
      border-radius: 48px 48px 32px 32px;
      box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.25), 0 8px 24px rgba(0,0,0,0.04);
      transition: all 0.2s;
      overflow: hidden;
    }

    /* ----- header / nav ----- */
    .top-bar {
      padding: 1.6rem 2.8rem;
      background: #ffffff;
      border-bottom: 1px solid #eef2f6;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 1rem 2rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand i {
      font-size: 2rem;
      color: #2563eb;
      background: #eef4ff;
      padding: 0.4rem;
      border-radius: 18px;
    }

    .brand h1 {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(145deg, #0b1e33, #1f3a5f);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .stats-pill {
      background: #f8fafc;
      padding: 0.45rem 1.4rem;
      border-radius: 60px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #1e293b;
      border: 1px solid #e9edf2;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .stats-pill i {
      color: #2563eb;
    }

    .stats-pill span {
      background: #e6edf8;
      padding: 0.1rem 0.6rem;
      border-radius: 30px;
      font-size: 0.75rem;
      margin-left: 4px;
    }

    .meta-links {
      display: flex;
      gap: 1.8rem;
      color: #475569;
      font-weight: 500;
      font-size: 0.9rem;
    }

    .meta-links i {
      margin-right: 6px;
      color: #2563eb;
      width: 18px;
    }

    /* ----- filter bar ----- */
    .filter-bar {
      padding: 0.8rem 2.8rem;
      background: #fafcff;
      border-bottom: 1px solid #eef2f6;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 0.6rem 1.2rem;
    }

    .filter-left {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .date-chip {
      background: white;
      padding: 0.2rem 1.2rem;
      border-radius: 40px;
      border: 1px solid #e2e8f0;
      font-size: 0.8rem;
      font-weight: 500;
      color: #0b1e33;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .view-toggle {
      display: flex;
      background: white;
      border-radius: 40px;
      border: 1px solid #e2e8f0;
      padding: 0.15rem;
    }

    .view-toggle button {
      background: transparent;
      border: none;
      padding: 0.3rem 1rem;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #64748b;
      cursor: pointer;
      transition: 0.1s;
    }

    .view-toggle button.active {
      background: #1e293b;
      color: white;
    }

    /* ----- grid ----- */
    .post-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
      padding: 2.2rem 2.8rem 2.8rem;
    }

    /* card */
    .post-card {
      background: #ffffff;
      border-radius: 28px;
      border: 1px solid #edf2f9;
      box-shadow: 0 8px 18px -8px rgba(0, 0, 0, 0.02);
      transition: all 0.25s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(2px);
    }

    .post-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 24px 40px -16px rgba(0, 20, 60, 0.12);
      border-color: #cddcec;
    }

    .media-box {
      width: 100%;
      aspect-ratio: 16 / 10;
      background: #eef2f6;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .media-box img, .media-box video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .media-box i {
      font-size: 3rem;
      color: #94a3b8;
      opacity: 0.5;
    }

    .card-body {
      padding: 1.2rem 1.4rem 0.8rem;
      flex: 1;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.6rem;
    }

    .type-badge {
      background: #eef4ff;
      padding: 0.15rem 0.9rem;
      border-radius: 40px;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #2563eb;
    }

    .type-badge.video { background: #fce7f0; color: #b91c5c; }
    .type-badge.photo { background: #dbeafe; color: #0369a1; }
    .type-badge.text  { background: #dcfce7; color: #166534; }

    .time-stamp {
      font-size: 0.7rem;
      font-weight: 500;
      color: #64748b;
      background: #f1f4f9;
      padding: 0.2rem 0.9rem;
      border-radius: 40px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .time-stamp i {
      font-size: 0.65rem;
      color: #2563eb;
    }

    .card-title {
      font-size: 1.05rem;
      font-weight: 650;
      color: #0b1e33;
      margin: 0.4rem 0 0.2rem;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 0.9rem;
      color: #334155;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-top: 0.2rem;
    }

    .card-actions {
      padding: 0.6rem 1.4rem 1rem;
      border-top: 1px solid #f0f4fa;
      display: flex;
      justify-content: flex-start;
      gap: 1.2rem;
      font-size: 0.8rem;
      color: #64748b;
    }

    .card-actions i {
      margin-right: 5px;
      color: #94a3b8;
    }

    /* footer note */
    .footer-note {
      text-align: center;
      padding: 1.2rem 2rem 2rem;
      color: #64748b;
      border-top: 1px solid #edf2f7;
      font-size: 0.9rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .footer-note i {
      color: #2563eb;
    }

    .footer-note .pill {
      background: #eef4ff;
      padding: 0.2rem 1.2rem;
      border-radius: 60px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    /* responsive */
    @media (max-width: 700px) {
      .top-bar { flex-direction: column; align-items: flex-start; padding: 1.2rem 1.5rem; }
      .meta-links { flex-wrap: wrap; gap: 0.8rem; }
      .filter-bar { flex-direction: column; align-items: stretch; padding: 0.8rem 1.5rem; }
      .post-grid { grid-template-columns: 1fr; padding: 1.2rem; }
    }
  </style>
</head>
<body>
<div class="app">
  <!-- top -->
  <div class="top-bar">
    <div class="brand">
      <i class="fas fa-bolt"></i>
      <h1>Pulse</h1>
    </div>
    <div class="stats-pill">
      <i class="fas fa-layer-group"></i> 100 posts <span>2026</span>
    </div>
    <div class="meta-links">
      <span><i class="fas fa-video"></i> 33</span>
      <span><i class="fas fa-image"></i> 34</span>
      <span><i class="fas fa-align-left"></i> 33</span>
    </div>
  </div>

  <!-- filter -->
  <div class="filter-bar">
    <div class="filter-left">
      <i class="fas fa-calendar-alt" style="color:#64748b;"></i>
      <span class="date-chip"><i class="far fa-calendar-check"></i> Jan 1 – Jul 11, 2026</span>
      <span style="color:#b9c7da;">•</span>
      <span style="font-size:0.8rem; font-weight:500; color:#1e293b;"><i class="far fa-clock"></i> live timestamp</span>
    </div>
    <div class="view-toggle">
      <button class="active"><i class="fas fa-th"></i> Grid</button>
      <button><i class="fas fa-list"></i> List</button>
    </div>
  </div>

  <!-- grid container -->
  <div class="post-grid" id="postGrid"></div>

  <!-- footer -->
  <div class="footer-note">
    <i class="fas fa-check-circle" style="color:#22c55e;"></i> 100 posts · daily from Jan 1, 2026
    <span class="pill"><i class="far fa-clock"></i> real-time</span>
  </div>
</div>

<script>
  (function() {
    const TOTAL_POSTS = 100;
    const START_DATE = new Date(2026, 0, 1); // Jan 1

    // ----- content pools -----
    const videoTitles = [
      "Morning vlog · city lights", "Tech unboxing · next gen", "Cooking with spices",
      "Fitness routine · full body", "Travel diary · alpine", "Studio session · piano",
      "Documentary short · water", "Gaming highlights · level up",
      "DIY craft · weekend project", "Interview · creative mind"
    ];
    const photoTitles = [
      "Golden hour · beach", "Minimalist architecture", "Nature macro · dew",
      "Urban street · neon", "Portrait · monochrome", "Wildlife · safari",
      "Abstract · fluid art", "Night sky · stars", "Culinary plate · design",
      "Botanical garden · spring"
    ];
    const textTitles = [
      "Thoughts on productivity", "Weekly reflection #12", "Poetry · silent dawn",
      "Tech trends 2026", "Mindfulness practice", "Book summary · non fiction",
      "Personal essay · growth", "Short story · the key", "Philosophy snippet",
      "Daily journal · gratitude"
    ];
    const textBodies = [
      "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.",
      "Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.",
      "Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur.",
      "Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.",
      "Sed ut perspiciatis unde omnis iste natus error sit voluptatem accusantium doloremque laudantium."
    ];

    const randomItem = (arr) => arr[Math.floor(Math.random() * arr.length)];

    function randomDate() {
      const end = new Date(2026, 6, 11);
      const diff = end.getTime() - START_DATE.getTime();
      return new Date(START_DATE.getTime() + Math.floor(Math.random() * (diff + 1)));
    }

    function formatTimestamp(date) {
      const d = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      const h = String(date.getHours()).padStart(2, '0');
      const m = String(date.getMinutes()).padStart(2, '0');
      return `${d} · ${h}:${m}`;
    }

    // generate post
    function generatePost(idx) {
      const r = Math.random();
      let type, title, mediaHtml, badgeClass, desc = '';

      const date = randomDate();
      const ts = formatTimestamp(date);

      if (r < 0.33) { // video
        type = 'video';
        title = randomItem(videoTitles);
        badgeClass = 'video';
        const thumb = `https://picsum.photos/seed/vid${idx}/400/250`;
        mediaHtml = `
          <div style="position:relative; width:100%; height:100%; background:#0b1e33;">
            <img src="${thumb}" alt="video" style="width:100%; height:100%; object-fit:cover; opacity:0.9;">
            <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.1);">
              <i class="fas fa-play-circle" style="color:white; font-size:3.4rem; filter:drop-shadow(0 4px 12px rgba(0,0,0,0.3));"></i>
            </div>
          </div>
        `;
      } else if (r < 0.66) { // photo
        type = 'photo';
        title = randomItem(photoTitles);
        badgeClass = 'photo';
        mediaHtml = `<img src="https://picsum.photos/seed/photo${idx}/400/250" alt="photo" loading="lazy">`;
      } else { // text
        type = 'text';
        title = randomItem(textTitles);
        badgeClass = 'text';
        desc = randomItem(textBodies);
        mediaHtml = `<div style="background:#f1f5f9; display:flex; align-items:center; justify-content:center; height:100%;"><i class="fas fa-quote-right" style="font-size:3.2rem; color:#94a3b8;"></i></div>`;
      }

      return { type, title, ts, badgeClass, mediaHtml, desc, dateObj: date };
    }

    // build 100 posts
    const posts = [];
    for (let i = 0; i < TOTAL_POSTS; i++) {
      posts.push(generatePost(i));
    }

    // sort oldest → newest (Jan 1 → July 11)
    posts.sort((a, b) => a.dateObj - b.dateObj);

    const grid = document.getElementById('postGrid');
    grid.innerHTML = '';

    posts.forEach((post, index) => {
      const card = document.createElement('div');
      card.className = 'post-card';

      // media
      const media = document.createElement('div');
      media.className = 'media-box';
      media.innerHTML = post.mediaHtml;

      // body
      const body = document.createElement('div');
      body.className = 'card-body';

      const head = document.createElement('div');
      head.className = 'card-head';
      head.innerHTML = `
        <span class="type-badge ${post.badgeClass}">${post.type}</span>
        <span class="time-stamp"><i class="far fa-clock"></i> ${post.ts}</span>
      `;

      const titleEl = document.createElement('div');
      titleEl.className = 'card-title';
      titleEl.textContent = post.title;

      const descEl = document.createElement('div');
      descEl.className = 'card-desc';
      if (post.type === 'text') {
        descEl.textContent = post.desc;
      } else {
        descEl.textContent = post.type === 'video' ? '🎬 Watch the full video' : '📸 Photo of the day';
      }

      body.appendChild(head);
      body.appendChild(titleEl);
      body.appendChild(descEl);

      // actions
      const actions = document.createElement('div');
      actions.className = 'card-actions';
      actions.innerHTML = `
        <span><i class="far fa-heart"></i> ${Math.floor(Math.random() * 70 + 15)}</span>
        <span><i class="far fa-comment"></i> ${Math.floor(Math.random() * 18 + 3)}</span>
        <span><i class="fas fa-share-alt"></i></span>
      `;

      card.appendChild(media);
      card.appendChild(body);
      card.appendChild(actions);
      grid.appendChild(card);
    });

    // update stat numbers
    const v = posts.filter(p => p.type === 'video').length;
    const ph = posts.filter(p => p.type === 'photo').length;
    const t = posts.filter(p => p.type === 'text').length;
    const metaSpans = document.querySelectorAll('.meta-links span');
    if (metaSpans.length >= 3) {
      metaSpans[0].innerHTML = `<i class="fas fa-video"></i> ${v}`;
      metaSpans[1].innerHTML = `<i class="fas fa-image"></i> ${ph}`;
      metaSpans[2].innerHTML = `<i class="fas fa-align-left"></i> ${t}`;
    }

    // view toggle (demo)
    document.querySelectorAll('.view-toggle button').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        if (this.textContent.includes('List')) {
          grid.style.gridTemplateColumns = '1fr';
        } else {
          grid.style.gridTemplateColumns = 'repeat(auto-fill, minmax(300px, 1fr))';
        }
      });
    });

    console.log('✅ 100 posts · timestamps from Jan 1, 2026');
  })();
</script>
</body>
</html>
